<!-- Interface onde o usuário irá inserir os dados cadastrais dos usuário para realizar o cadastro no sistema;-->

<!-- Utiliza : scriptCadUser.JS-->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
</head>
<body>
    <form id="cadUser">
        <input type="text" name="user" id="usuario" placeholder="Usuário..." >
            <br>
        <input type="password" name="password" id="senha" placeholder="Senha..." value="">
            <br>
        <select id="nivel">
            <option value="moder">Diretor</option>
            <option value="coord">Coordenador</option>
            <option value="prof">Professor</option>
        </select>

        <br>

        <button type="submit">Cadastrar Usuário</button>
    </form>

    <script type='module' src="./backend/scriptCadUser.js"></script>
</body>
</html>
