<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Disciplinas</title>
</head>
<body>
    <h1>Cadastro de Disciplinas</h1>

    <form id="cadSubject">
        <input type="text" name="nDisciplina" id="nDisciplina">

        <br>
        
        <select id="cursoSelect">
            <option value="">-- Selecione --</option>
        </select>
         
        <br>

        <select id="profSelect">
            <option value="">-- Selecione --</option>
        </select>

        <br>
        
        <select id="diaSelect">
            <option value="">-- Selecione --</option>
            <option value="segunda">Segunda-feira</option>
            <option value="terca">Terça-feira</option>
            <option value="quarta">Quarta-feira</option>
            <option value="quinta">Quinta-feira</option>
            <option value="sexta">Sexta-feira</option>
        </select>

        <br>

        <select id="horaSelect">
            <option value="">-- Selecione --</option>
            <option value="4aulas">19h00 - 22h30 (4 Aulas)</option>
            <option value="2aulas">19h00 - 20h50 (2 Aulas)</option>
            
        </select>

        <br>
        
        <button type="submit">Cadastrar Disciplina</button>
    </form>

    <script src="./backend/showCurso.js"></script>
    <script src="./backend/showProf.js"></script>
    <script type="module" src="./backend/scriptCadSub.js"></script>

</body>
</html>
